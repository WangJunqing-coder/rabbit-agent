# ============================================
# Rabbit Agent 配置文件
# ============================================

# LLM 配置
llm:
  # 提供商: ollama, openai, deepseek, anthropic
  provider: deepseek
  
  # 模型名称
  model: deepseek-v4-flash
  
  # API 地址
  api_base: https://api.deepseek.com/v1
  
  # API 密钥 (请替换为你的密钥)
  api_key: YOU-API-KEY
  
  # 生成参数
  temperature: 0.7
  max_tokens: 8192
  timeout: 300

  # 上下文窗口大小 (tokens), 0 表示自动检测
  context_window: 1024000

# Agent 配置
agent:
  max_iterations: 100
  max_tool_retries: 3
  tool_timeout: 120
  max_context_messages: 100
  terminal_timeout: 60
  max_file_size: 2097152

# 界面配置
ui:
  language: zh
  show_token_usage: true
  color_theme: default
